<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

  // ⚠️ 請在此處替換成你從 Firebase 畫面看到的 Config 資訊
  const firebaseConfig = {
  apiKey: "AIzaSyDhGy__CH03twANIjWJSCpJ0VdOMHvA8V8",
  authDomain: "hair-diary-1c252.firebaseapp.com",
  databaseURL: "https://hair-diary-1c252-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hair-diary-1c252",
  storageBucket: "hair-diary-1c252.firebasestorage.app",
  messagingSenderId: "713386825016",
  appId: "1:713386825016:web:a2c1148a89237b08261dcd",
  measurementId: "G-5HSKJER512"
  };

  // 初始化 Firebase
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const entriesRef = ref(db, 'hairEntries');

  let entries = [];
  let currentPage = 'record';

  // 初始化時間
  const timeInput = document.getElementById('field-time');
  function resetTime() {
    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    timeInput.value = now.toISOString().slice(0, 16);
  }
  resetTime();

  // 監聽 Firebase 數據變動（即時同步）
  onValue(entriesRef, (snapshot) => {
    const data = snapshot.val();
    entries = [];
    if (data) {
      Object.keys(data).forEach(key => {
        entries.push({ ...data[key], id: key }); // 使用 Firebase 的 key 作為 id
      });
    }
    // 排序數據
    entries.sort((a, b) => new Date(a.time) - new Date(b.time));
    
    // 自動更新當前頁面
    if (currentPage === 'harvest') drawViz();
    if (currentPage === 'history') renderHistory();
  });

  // 切換分頁邏輯
  window.switchPage = function(pageId) {
    currentPage = pageId;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + pageId).classList.add('active');
    event.currentTarget.classList.add('active');

    if (pageId === 'harvest') drawViz();
    if (pageId === 'history') renderHistory();
  }

  // 提交數據到 Firebase
  window.commitData = async function() {
    const ctxSelect = document.getElementById('field-ctx').value;
    const finalCtx = ctxSelect === 'other' ? document.getElementById('other-ctx').value : ctxSelect;

    const newEntry = {
      time: timeInput.value,
      hand: document.getElementById('field-hand').value,
      location: document.getElementById('field-loc').value,
      context: finalCtx || '—',
      state: document.getElementById('field-state').value,
      createdAt: Date.now()
    };

    try {
      await push(entriesRef, newEntry);
      alert('數據已同步至雲端');
      resetTime();
      document.getElementById('other-ctx').value = '';
      document.getElementById('other-ctx').style.display = 'none';
      document.getElementById('field-ctx').value = '開會中';
    } catch (e) {
      alert('同步失敗：' + e.message);
    }
  }

  // 從 Firebase 刪除數據
  window.deleteEntry = async function(id) {
    if (confirm('確定要刪除這筆紀錄嗎？這將會同步影響到視覺化圖表。')) {
      await remove(ref(db, `hairEntries/${id}`));
    }
  }

  // --- 視覺化繪圖邏輯 (完全保留你原本的邏輯) ---
  function drawViz() {
    const canvas = document.getElementById('hairCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    canvas.width = canvas.offsetWidth * dpr;
    canvas.height = canvas.offsetHeight * dpr;
    ctx.scale(dpr, dpr);

    ctx.clearRect(0, 0, canvas.offsetWidth, canvas.offsetHeight);

    // 繪製背景髮絲
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.strokeStyle = `rgba(44, 36, 23, ${0.05 + i * 0.05})`;
      ctx.lineWidth = 1.5;
      const yBase = 100 + i * 140;
      ctx.moveTo(0, yBase);
      ctx.bezierCurveTo(canvas.offsetWidth * 0.3, yBase - 80, canvas.offsetWidth * 0.7, yBase + 80, canvas.offsetWidth, yBase);
      ctx.stroke();
    }

    // 繪製數據點
    entries.forEach(e => {
      const d = new Date(e.time);
      const hour = d.getHours() + d.getMinutes() / 60;
      const dayIdx = d.getDate() % 3;
      const x = (hour / 24) * canvas.offsetWidth;
      const yBase = 100 + dayIdx * 140;

      const locMap = { '左耳後(LB)': -30, '右耳後(RB)': 30, '左脖子(LN)': 60, '右脖子(RN)': 80, '額頭(F)': -60 };
      const y = yBase + (locMap[e.location] || 0);

      const colors = { '左手(L)': '#D4896A', '右手(R)': '#7A9E7E', '雙手(B)': '#C9A84C' };
      ctx.fillStyle = colors[e.hand] || '#2C2417';
      
      ctx.beginPath();
      if (e.state === '剛洗好') ctx.arc(x, y, 6, 0, Math.PI * 2);
      else if (e.state === '有點油') { ctx.rect(x - 5, y - 5, 10, 10); }
      else if (e.state === '綁起來時') { ctx.moveTo(x, y - 7); ctx.lineTo(x + 7, y + 7); ctx.lineTo(x - 7, y + 7); ctx.closePath(); }
      else { ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.stroke(); }
      ctx.fill();
    });
  }

  // --- 渲染歷史列表 (完全保留你原本的 UI) ---
  function renderHistory() {
    const list = document.getElementById('history-list');
    list.innerHTML = '';
    const displayEntries = [...entries].reverse();
    
    displayEntries.forEach((e, i) => {
      const handC = e.hand.includes('L') ? '#D4896A' : (e.hand.includes('R') ? '#7A9E7E' : '#C9A84C');
      const locC = '#5B8FA8';
      const stateC = '#8B7BAB';

      const div = document.createElement('div');
      div.className = 'history-card';
      div.innerHTML = `
        <div class="entry-index">${displayEntries.length - i}</div>
        <div class="entry-content">
          <div class="entry-time">${e.time}</div>
          <div class="entry-tags">
            <span class="entry-tag" style="background:${handC}">${e.hand}</span>
            <span class="entry-tag" style="background:${locC}">${e.location}</span>
            <span class="entry-tag" style="background:${stateC}">${e.state}</span>
            ${e.context !== '—' ? `<span class="entry-tag" style="background:#B8A99A">${e.context}</span>` : ''}
          </div>
        </div>
        <div class="entry-actions">
          <button class="btn-delete" onclick="deleteEntry('${e.id}')">刪除 ✕</button>
        </div>
      `;
      list.appendChild(div);
    });
  }
</script>
